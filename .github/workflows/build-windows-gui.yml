name: Build Windows GUI Only

# 触发条件：当你推代码，或者手动在网页上点击运行
on: 
  push:
    branches: [ "master", "main" ] # 如果你的主分支叫其他名字，请修改这里
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动点击按钮触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 .NET 9.0 环境 (根据原仓库要求)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # 3. 仅编译 Windows GUI 版本
    - name: Build Windows GUI
      run: |
        dotnet publish ./VDF.GUI/VDF.GUI.csproj -c Release -v q --self-contained -r win-x64 -o outputGUI

    # 4. 将编译好的文件打包成 Artifact 供你下载
    - name: Upload GUI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoDuplicateFinder-Win64-GUI
        path: outputGUI/